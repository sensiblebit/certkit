repos:
  - repo: https://github.com/sensiblebit/.github
    rev: "fb8829a3bdb52f8263024528909088706009c1e1"
    hooks:
      - id: branch-name
      - id: commit-message
      - id: goimports
      - id: go-fix
      - id: go-vet
      - id: golangci-lint
      - id: wasm
      - id: go-build
      - id: go-test
      - id: govulncheck
      - id: gendocs
      - id: prettier
      - id: vitest
      - id: wrangler-build
      - id: go-mod-update
      - id: npm-update

  - repo: local
    hooks:
      - id: markdownlint
        name: markdownlint
        language: node
        entry: markdownlint
        additional_dependencies: [markdownlint-cli@0.47.0]
        args: [--config, .markdownlint.yaml]
        types: [markdown]
