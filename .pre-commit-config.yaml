repos:
  - repo: https://github.com/sensiblebit/.github
    rev: "c50f977afaa9eaf67c13a08f5fae77ed4baf0015"
    hooks:
      - id: branch-name
      - id: commit-message
      - id: go-mod-update
        stages: [pre-commit]
      - id: npm-update
        stages: [pre-commit]
      - id: goimports
      - id: go-fix
      - id: prettier
      - id: markdownlint
        args: [--config, .markdownlint.yaml]
      - id: go-vet
      - id: golangci-lint
      - id: govulncheck
      - id: gendocs
      - id: wasm
      - id: go-build
      - id: wrangler-build
      - id: go-test
      - id: vitest
