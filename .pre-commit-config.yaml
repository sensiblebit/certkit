repos:
  - repo: https://github.com/sensiblebit/.github
    rev: "6b8b7cc2c3ff7549b510865c478cb5f8b43d0f4e"
    hooks:
      - id: branch-name
      - id: commit-message
      - id: goimports
      - id: go-fix
      - id: go-vet
      - id: golangci-lint
      - id: wasm
      - id: go-build
      - id: go-test
      - id: govulncheck
      - id: gendocs
      - id: prettier
      - id: markdownlint
        args: [--config, .markdownlint.yaml]
      - id: vitest
      - id: wrangler-build
      - id: go-mod-update
      - id: npm-update
