name: Nightly Cask

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nightly-cask
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-nightly-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
          cache: true

      - name: Build nightly archives
        id: meta
        run: |
          set -euo pipefail

          nightly_ts="$(date -u +%Y%m%d%H%M%S)"
          short_sha="${GITHUB_SHA::7}"
          nightly_version="nightly-${nightly_ts}-${short_sha}"

          mkdir -p /tmp/nightly-dist /tmp/nightly-build

          for target in "darwin amd64" "darwin arm64" "linux amd64" "linux arm64"; do
            read -r goos goarch <<<"${target}"
            archive="certkit_${nightly_version}_${goos}_${goarch}.tar.gz"

            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "-s -w -X main.version=${nightly_version}" \
              -o /tmp/nightly-build/certkit ./cmd/certkit

            tar -C /tmp/nightly-build -czf "/tmp/nightly-dist/${archive}" certkit
            sha="$(sha256sum "/tmp/nightly-dist/${archive}" | awk '{print $1}')"
            echo "sha_${goos}_${goarch}=${sha}" >> "${GITHUB_OUTPUT}"
          done

          echo "nightly_version=${nightly_version}" >> "${GITHUB_OUTPUT}"

      - name: Publish nightly release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly --target "${GITHUB_SHA}" --prerelease --title "Nightly" --notes "Auto-updated nightly snapshot of main."
          else
            gh release create nightly --target "${GITHUB_SHA}" --prerelease --title "Nightly" --notes "Auto-updated nightly snapshot of main."
          fi

          gh release upload nightly /tmp/nightly-dist/*.tar.gz

      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: sensiblebit/homebrew-tap
          path: homebrew-tap
          fetch-depth: 0
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Render nightly cask
        run: |
          set -euo pipefail
          mkdir -p homebrew-tap/Casks
          cat > homebrew-tap/Casks/certkit@nightly.rb <<EOF
# This file is auto-generated by certkit nightly workflow. DO NOT EDIT.
cask "certkit@nightly" do
  name "certkit nightly"
  desc "Nightly snapshots of certkit certificate tooling"
  homepage "https://github.com/sensiblebit/certkit"
  version "${{ steps.meta.outputs.nightly_version }}"

  livecheck do
    skip "Updated on every push to main."
  end

  conflicts_with cask: "certkit"

  binary "certkit"

  on_macos do
    postflight do
      system_command "/usr/bin/xattr",
                     args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
    end

    on_intel do
      url "https://github.com/sensiblebit/certkit/releases/download/nightly/certkit_#{version}_darwin_amd64.tar.gz"
      sha256 "${{ steps.meta.outputs.sha_darwin_amd64 }}"
    end
    on_arm do
      url "https://github.com/sensiblebit/certkit/releases/download/nightly/certkit_#{version}_darwin_arm64.tar.gz"
      sha256 "${{ steps.meta.outputs.sha_darwin_arm64 }}"
    end
  end

  on_linux do
    on_intel do
      url "https://github.com/sensiblebit/certkit/releases/download/nightly/certkit_#{version}_linux_amd64.tar.gz"
      sha256 "${{ steps.meta.outputs.sha_linux_amd64 }}"
    end
    on_arm do
      url "https://github.com/sensiblebit/certkit/releases/download/nightly/certkit_#{version}_linux_arm64.tar.gz"
      sha256 "${{ steps.meta.outputs.sha_linux_arm64 }}"
    end
  end
end
EOF

          stable_cask="homebrew-tap/Casks/certkit.rb"
          if [[ -f "${stable_cask}" ]] && ! grep -q 'conflicts_with cask: "certkit@nightly"' "${stable_cask}"; then
            if grep -q '^[[:space:]]*binary "certkit"' "${stable_cask}"; then
              awk '
                /^[[:space:]]*binary "certkit"/ && !inserted {
                  print "  conflicts_with cask: \"certkit@nightly\""
                  inserted=1
                }
                { print }
              ' "${stable_cask}" > "${stable_cask}.tmp"
              mv "${stable_cask}.tmp" "${stable_cask}"
            elif grep -q '^[[:space:]]*cask[[:space:]]+"certkit"[[:space:]]+do[[:space:]]*$' "${stable_cask}"; then
              awk '
                /^[[:space:]]*cask[[:space:]]+"certkit"[[:space:]]+do[[:space:]]*$/ && !inserted {
                  print
                  print "  conflicts_with cask: \"certkit@nightly\""
                  inserted=1
                  next
                }
                { print }
              ' "${stable_cask}" > "${stable_cask}.tmp"
              mv "${stable_cask}.tmp" "${stable_cask}"
            else
              echo "::warning::Unable to patch ${stable_cask}; add conflicts_with cask: \\\"certkit@nightly\\\" manually if needed."
            fi
          fi

      - name: Commit and push tap update
        run: |
          set -euo pipefail
          cd homebrew-tap

          changed_files="$(git status --porcelain -- Casks/certkit@nightly.rb Casks/certkit.rb || true)"
          if [[ -z "${changed_files}" ]]; then
            echo "No cask changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/certkit@nightly.rb
          if [[ -f Casks/certkit.rb ]]; then
            git add Casks/certkit.rb
          fi
          git commit -m "chore: update certkit@nightly to ${{ steps.meta.outputs.nightly_version }}"
          git push origin HEAD:main

      - name: Prune superseded nightly release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          keep_prefix="certkit_${{ steps.meta.outputs.nightly_version }}_"
          gh release view nightly --json assets --jq '.assets[] | [.id, .name] | @tsv' \
            | while IFS=$'\t' read -r asset_id asset_name; do
              if [[ "${asset_name}" != certkit_* ]]; then
                continue
              fi
              if [[ "${asset_name}" == "${keep_prefix}"* ]]; then
                continue
              fi
              gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
            done
