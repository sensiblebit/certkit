name: Nightly Formula

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-nightly-formula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute nightly metadata
        id: meta
        run: |
          set -euo pipefail

          nightly_ts="$(date -u +%Y%m%d%H%M%S)"
          short_sha="${GITHUB_SHA::7}"
          nightly_version="nightly-${nightly_ts}-${short_sha}"
          source_url="https://github.com/sensiblebit/certkit/archive/${GITHUB_SHA}.tar.gz"

          curl -fsSL "${source_url}" -o /tmp/certkit-nightly.tar.gz
          source_sha256="$(sha256sum /tmp/certkit-nightly.tar.gz | awk '{print $1}')"

          {
            echo "nightly_version=${nightly_version}"
            echo "source_url=${source_url}"
            echo "source_sha256=${source_sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Clone tap repository
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sensiblebit/homebrew-tap.git" /tmp/homebrew-tap

      - name: Render nightly formula
        run: |
          set -euo pipefail
          mkdir -p /tmp/homebrew-tap/Formula
          cat > /tmp/homebrew-tap/Formula/certkit-nightly.rb <<EOF
# This file is auto-generated by certkit nightly workflow. DO NOT EDIT.
class CertkitNightly < Formula
  desc "Nightly snapshots of certkit certificate tooling"
  homepage "https://github.com/sensiblebit/certkit"
  url "${{ steps.meta.outputs.source_url }}"
  version "${{ steps.meta.outputs.nightly_version }}"
  sha256 "${{ steps.meta.outputs.source_sha256 }}"
  license "MIT"
  head "https://github.com/sensiblebit/certkit.git", branch: "main"

  depends_on "go" => :build

  def install
    ldflags = "-s -w -X main.version=#{version}"
    system "go", "build", *std_go_args(ldflags:, output: bin/"certkit-nightly"), "./cmd/certkit"
  end

  test do
    assert_match version.to_s, shell_output("#{bin}/certkit-nightly --version")
  end
end
EOF

      - name: Commit and push tap update
        run: |
          set -euo pipefail
          cd /tmp/homebrew-tap

          if git diff --quiet -- Formula/certkit-nightly.rb; then
            echo "No formula changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/certkit-nightly.rb
          git commit -m "chore: update certkit-nightly to ${{ steps.meta.outputs.nightly_version }}"
          git push origin HEAD:main
